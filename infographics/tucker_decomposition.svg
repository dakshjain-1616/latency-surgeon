<svg viewBox="0 0 860 340" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="wgrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#b91c1c" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="agrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5b21b6" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="bgrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#22c55e"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#7c3aed" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="340" fill="url(#bg2)" rx="16"/>
  <rect width="860" height="340" fill="none" stroke="#334155" stroke-width="1" rx="16"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="700">🔬 Tucker Decomposition — How It Works</text>

  <!-- ORIGINAL WEIGHT MATRIX W [768×768] -->
  <!-- Drawn as a square at x=60, y=70, size=140×140 -->
  <rect x="60" y="70" width="140" height="140" fill="url(#wgrad)" rx="8" filter="url(#shadow)"/>
  <!-- Grid lines inside W to suggest a big matrix -->
  <line x1="60" y1="93" x2="200" y2="93" stroke="#fff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="60" y1="116" x2="200" y2="116" stroke="#fff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="60" y1="140" x2="200" y2="140" stroke="#fff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="60" y1="163" x2="200" y2="163" stroke="#fff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="60" y1="186" x2="200" y2="186" stroke="#fff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="83" y1="70" x2="83" y2="210" stroke="#fff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="106" y1="70" x2="106" y2="210" stroke="#fff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="130" y1="70" x2="130" y2="210" stroke="#fff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="153" y1="70" x2="153" y2="210" stroke="#fff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="177" y1="70" x2="177" y2="210" stroke="#fff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="130" y="130" text-anchor="middle" fill="#fca5a5" font-size="20" font-weight="700">W</text>
  <text x="130" y="152" text-anchor="middle" fill="#fca5a5" font-size="12">[768×768]</text>
  <text x="130" y="225" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">589,824 params</text>
  <text x="130" y="240" text-anchor="middle" fill="#94a3b8" font-size="10">1 Linear layer</text>

  <!-- SVD arrow -->
  <line x1="205" y1="140" x2="270" y2="140" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="237" y="128" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600">SVD</text>
  <text x="237" y="155" text-anchor="middle" fill="#7c3aed" font-size="10">truncate</text>
  <text x="237" y="167" text-anchor="middle" fill="#7c3aed" font-size="10">to rank r</text>

  <!-- W ≈ A · B label -->
  <text x="430" y="62" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="600">W  ≈  A  ·  B</text>

  <!-- MATRIX A [768×64] — tall narrow -->
  <rect x="275" y="90" width="50" height="140" fill="url(#agrad)" rx="8" filter="url(#shadow)"/>
  <text x="300" y="158" text-anchor="middle" fill="#ddd6fe" font-size="16" font-weight="700">A</text>
  <text x="300" y="225" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600">49,152</text>
  <text x="300" y="238" text-anchor="middle" fill="#94a3b8" font-size="10">[768×64]</text>

  <!-- multiply dot -->
  <text x="345" y="166" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="300">·</text>

  <!-- MATRIX B [64×768] — wide short -->
  <rect x="362" y="120" width="140" height="50" fill="url(#bgrad)" rx="8" filter="url(#shadow)"/>
  <text x="432" y="151" text-anchor="middle" fill="#d1fae5" font-size="16" font-weight="700">B</text>
  <text x="432" y="225" text-anchor="middle" fill="#34d399" font-size="11" font-weight="600">49,152</text>
  <text x="432" y="238" text-anchor="middle" fill="#94a3b8" font-size="10">[64×768]</text>

  <!-- Brace / total -->
  <line x1="275" y1="260" x2="502" y2="260" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="388" y="278" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">98,304 total params  (↓ 83%)</text>
  <text x="388" y="293" text-anchor="middle" fill="#94a3b8" font-size="10">2 small Linear layers</text>

  <!-- Arrow to network diagram -->
  <line x1="520" y1="140" x2="575" y2="140" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="547" y="128" text-anchor="middle" fill="#6ee7b7" font-size="10">replaces</text>
  <text x="547" y="157" text-anchor="middle" fill="#6ee7b7" font-size="10">layer with</text>

  <!-- NETWORK DIAGRAM: input → Linear(768,64) → Linear(64,768) → output -->
  <!-- Input node -->
  <ellipse cx="600" cy="100" rx="28" ry="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="600" y="104" text-anchor="middle" fill="#93c5fd" font-size="10">x [768]</text>

  <!-- Arrow down -->
  <line x1="600" y1="118" x2="600" y2="148" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Linear 1 -->
  <rect x="560" y="150" width="80" height="36" fill="#3b1d8a" rx="6" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="600" y="164" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Linear</text>
  <text x="600" y="178" text-anchor="middle" fill="#a78bfa" font-size="10">768 → 64</text>

  <!-- Arrow -->
  <line x1="600" y1="186" x2="600" y2="216" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Intermediate node -->
  <ellipse cx="600" cy="228" rx="28" ry="14" fill="#1a3a2a" stroke="#22c55e" stroke-width="1"/>
  <text x="600" y="232" text-anchor="middle" fill="#86efac" font-size="10">z [64]</text>

  <!-- Arrow -->
  <line x1="600" y1="242" x2="600" y2="272" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Linear 2 -->
  <rect x="560" y="274" width="80" height="36" fill="#064e3b" rx="6" stroke="#22c55e" stroke-width="1.5"/>
  <text x="600" y="288" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">Linear</text>
  <text x="600" y="302" text-anchor="middle" fill="#34d399" font-size="10">64 → 768</text>

  <!-- Arrow -->
  <line x1="641" y1="292" x2="680" y2="292" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Output node -->
  <ellipse cx="712" cy="292" rx="28" ry="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="712" y="296" text-anchor="middle" fill="#93c5fd" font-size="10">y [768]</text>

  <!-- Savings callout box -->
  <rect x="660" y="80" width="180" height="110" fill="#0f172a" rx="10" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="750" y="100" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">At rank r = 64</text>
  <line x1="675" y1="108" x2="825" y2="108" stroke="#334155" stroke-width="1"/>
  <text x="750" y="124" text-anchor="middle" fill="#94a3b8" font-size="11">Params:  589K → 98K</text>
  <text x="750" y="140" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">↓ 83% parameters</text>
  <text x="750" y="158" text-anchor="middle" fill="#94a3b8" font-size="11">FLOPs:  589K → 98K</text>
  <text x="750" y="174" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">↑ 1.4× faster</text>

  <!-- Footer -->
  <text x="430" y="325" text-anchor="middle" fill="#334155" font-size="10">🏥 LatencySurgeon — Tucker Decomposition for Transformer Inference  |  Built with NEO</text>
</svg>
