<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="step1g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="step2g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b1d8a"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>
    <linearGradient id="step3g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>
    <linearGradient id="step4g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#431407"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
    <marker id="parr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#pbg)" rx="16"/>
  <rect width="900" height="200" fill="none" stroke="#334155" stroke-width="1" rx="16"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700" letter-spacing="0.3">🏥 LatencySurgeon — 4-Step Surgery Pipeline</text>

  <!-- Step boxes: 4 steps, each ~160px wide, gap 20px, start at x=30 -->
  <!-- Step 1 -->
  <rect x="30" y="50" width="170" height="110" fill="url(#step1g)" rx="10" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="115" y="73" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">STEP 1</text>
  <text x="115" y="91" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Load Model</text>
  <line x1="48" y1="98" x2="182" y2="98" stroke="#1e40af" stroke-width="1"/>
  <text x="115" y="114" text-anchor="middle" fill="#94a3b8" font-size="10">from_pretrained(</text>
  <text x="115" y="127" text-anchor="middle" fill="#60a5fa" font-size="10">"gpt2"</text>
  <text x="115" y="142" text-anchor="middle" fill="#94a3b8" font-size="10">)</text>

  <!-- Arrow 1→2 -->
  <line x1="202" y1="105" x2="238" y2="105" stroke="#7c3aed" stroke-width="2" marker-end="url(#parr)"/>

  <!-- Step 2 -->
  <rect x="240" y="50" width="170" height="110" fill="url(#step2g)" rx="10" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="325" y="73" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">STEP 2</text>
  <text x="325" y="91" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Build Manifest</text>
  <line x1="258" y1="98" x2="392" y2="98" stroke="#4c1d95" stroke-width="1"/>
  <text x="325" y="113" text-anchor="middle" fill="#94a3b8" font-size="10">Scan attention layers</text>
  <text x="325" y="127" text-anchor="middle" fill="#a78bfa" font-size="10">q/k/v/o projections</text>
  <text x="325" y="141" text-anchor="middle" fill="#94a3b8" font-size="10">24 targets found</text>

  <!-- Arrow 2→3 -->
  <line x1="412" y1="105" x2="448" y2="105" stroke="#7c3aed" stroke-width="2" marker-end="url(#parr)"/>

  <!-- Step 3 -->
  <rect x="450" y="50" width="170" height="110" fill="url(#step3g)" rx="10" stroke="#22c55e" stroke-width="1.5"/>
  <text x="535" y="73" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700">STEP 3</text>
  <text x="535" y="91" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Apply Surgery</text>
  <line x1="468" y1="98" x2="602" y2="98" stroke="#065f46" stroke-width="1"/>
  <text x="535" y="113" text-anchor="middle" fill="#94a3b8" font-size="10">SVD → rank-r approx</text>
  <text x="535" y="127" text-anchor="middle" fill="#34d399" font-size="10">W → A · B</text>
  <text x="535" y="141" text-anchor="middle" fill="#94a3b8" font-size="10">83% fewer params</text>

  <!-- Arrow 3→4 -->
  <line x1="622" y1="105" x2="658" y2="105" stroke="#7c3aed" stroke-width="2" marker-end="url(#parr)"/>

  <!-- Step 4 -->
  <rect x="660" y="50" width="200" height="110" fill="url(#step4g)" rx="10" stroke="#f97316" stroke-width="1.5"/>
  <text x="760" y="73" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">STEP 4</text>
  <text x="760" y="91" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Benchmark + Report</text>
  <line x1="678" y1="98" x2="842" y2="98" stroke="#7c2d12" stroke-width="1"/>
  <text x="760" y="113" text-anchor="middle" fill="#22c55e" font-size="10">▲ +40% tokens/sec</text>
  <text x="760" y="127" text-anchor="middle" fill="#22c55e" font-size="10">▼ -28% P50 latency</text>
  <text x="760" y="141" text-anchor="middle" fill="#fb923c" font-size="10">HTML report generated</text>

  <!-- Footer -->
  <text x="450" y="186" text-anchor="middle" fill="#334155" font-size="10">Built with NEO — Your Autonomous AI Agent  |  heyneo.com</text>
</svg>
