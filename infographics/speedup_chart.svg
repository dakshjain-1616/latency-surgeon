<svg viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="grad_baseline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="grad_bnb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="grad_gptq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="grad_awq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="grad_r128" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="grad_r64" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="grad_r32" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="grad_r16" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="400" fill="url(#bg)" rx="16"/>
  <rect width="860" height="400" fill="none" stroke="#334155" stroke-width="1" rx="16"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="700" letter-spacing="0.5">📊 Inference Speedup Comparison — GPT-2, CPU, 32 tokens</text>
  <text x="430" y="56" text-anchor="middle" fill="#64748b" font-size="12">Tokens / second  (higher is better)  ★ = recommended</text>

  <!-- Grid lines -->
  <line x1="80" y1="80" x2="840" y2="80" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="130" x2="840" y2="130" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="180" x2="840" y2="180" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="230" x2="840" y2="230" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="280" x2="840" y2="280" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="310" x2="840" y2="310" stroke="#334155" stroke-width="1.5"/>

  <!-- Y axis labels -->
  <text x="68" y="84" text-anchor="end" fill="#94a3b8" font-size="11">200</text>
  <text x="68" y="134" text-anchor="end" fill="#94a3b8" font-size="11">160</text>
  <text x="68" y="184" text-anchor="end" fill="#94a3b8" font-size="11">120</text>
  <text x="68" y="234" text-anchor="end" fill="#94a3b8" font-size="11">80</text>
  <text x="68" y="284" text-anchor="end" fill="#94a3b8" font-size="11">40</text>
  <text x="68" y="314" text-anchor="end" fill="#94a3b8" font-size="11">0</text>

  <!-- Bars: baseline=100, scale: 200tok/s = 230px height, so 1tok = 1.15px
       bar bottom y=310, bar height = value * 1.15
       bar width=70, gap=16, start x=90
       Positions: 90, 176, 262, 348, 434, 520, 606, 692 -->

  <!-- Baseline 100 tok/s → h=115 -->
  <rect x="90" y="195" width="70" height="115" fill="url(#grad_baseline)" rx="4" opacity="0.9"/>
  <text x="125" y="190" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">100</text>

  <!-- BnB 118 tok/s → h=136 -->
  <rect x="176" y="174" width="70" height="136" fill="url(#grad_bnb)" rx="4" opacity="0.9"/>
  <text x="211" y="169" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">118</text>

  <!-- GPTQ 155 tok/s → h=178 -->
  <rect x="262" y="132" width="70" height="178" fill="url(#grad_gptq)" rx="4" opacity="0.9"/>
  <text x="297" y="127" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="600">155</text>

  <!-- AWQ 158 tok/s → h=182 -->
  <rect x="348" y="128" width="70" height="182" fill="url(#grad_awq)" rx="4" opacity="0.9"/>
  <text x="383" y="123" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="600">158</text>

  <!-- Tucker r=128 120 tok/s → h=138 -->
  <rect x="434" y="172" width="70" height="138" fill="url(#grad_r128)" rx="4" opacity="0.9"/>
  <text x="469" y="167" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">120</text>

  <!-- Tucker r=64 ★ 140 tok/s → h=161 -->
  <rect x="520" y="149" width="70" height="161" fill="url(#grad_r64)" rx="4" filter="url(#glow)"/>
  <text x="555" y="144" text-anchor="middle" fill="#e879f9" font-size="13" font-weight="700">140 ★</text>
  <!-- star glow border -->
  <rect x="520" y="149" width="70" height="161" fill="none" stroke="#e879f9" stroke-width="1.5" rx="4" opacity="0.6"/>

  <!-- Tucker r=32 162 tok/s → h=186 -->
  <rect x="606" y="124" width="70" height="186" fill="url(#grad_r32)" rx="4" opacity="0.9"/>
  <text x="641" y="119" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="600">162</text>

  <!-- Tucker r=16 185 tok/s → h=213 -->
  <rect x="692" y="97" width="70" height="213" fill="url(#grad_r16)" rx="4" opacity="0.9"/>
  <text x="727" y="92" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">185</text>

  <!-- X axis labels -->
  <text x="125" y="330" text-anchor="middle" fill="#94a3b8" font-size="11">Baseline</text>
  <text x="125" y="342" text-anchor="middle" fill="#94a3b8" font-size="11">fp32</text>

  <text x="211" y="330" text-anchor="middle" fill="#93c5fd" font-size="11">BnB</text>
  <text x="211" y="342" text-anchor="middle" fill="#93c5fd" font-size="11">int8</text>

  <text x="297" y="330" text-anchor="middle" fill="#67e8f9" font-size="11">GPTQ</text>
  <text x="297" y="342" text-anchor="middle" fill="#67e8f9" font-size="11">int4</text>

  <text x="383" y="330" text-anchor="middle" fill="#67e8f9" font-size="11">AWQ</text>
  <text x="383" y="342" text-anchor="middle" fill="#67e8f9" font-size="11">int4</text>

  <text x="469" y="330" text-anchor="middle" fill="#c4b5fd" font-size="11">Tucker</text>
  <text x="469" y="342" text-anchor="middle" fill="#c4b5fd" font-size="11">r=128</text>

  <text x="555" y="330" text-anchor="middle" fill="#e879f9" font-size="11" font-weight="700">Tucker</text>
  <text x="555" y="342" text-anchor="middle" fill="#e879f9" font-size="11" font-weight="700">r=64 ★</text>

  <text x="641" y="330" text-anchor="middle" fill="#6ee7b7" font-size="11">Tucker</text>
  <text x="641" y="342" text-anchor="middle" fill="#6ee7b7" font-size="11">r=32</text>

  <text x="727" y="330" text-anchor="middle" fill="#86efac" font-size="11">Tucker</text>
  <text x="727" y="342" text-anchor="middle" fill="#86efac" font-size="11">r=16</text>

  <!-- Legend -->
  <rect x="90" y="365" width="12" height="12" fill="#475569" rx="2"/>
  <text x="108" y="375" fill="#94a3b8" font-size="11">Baseline / Quant</text>
  <rect x="230" y="365" width="12" height="12" fill="#9333ea" rx="2"/>
  <text x="248" y="375" fill="#c4b5fd" font-size="11">Tucker (ours)</text>
  <rect x="360" y="365" width="12" height="12" fill="#e879f9" rx="2"/>
  <text x="378" y="375" fill="#e879f9" font-size="11">★ Sweet spot (r=64)</text>
  <text x="700" y="375" text-anchor="end" fill="#475569" font-size="11">🏥 LatencySurgeon v0.1.0</text>
</svg>
